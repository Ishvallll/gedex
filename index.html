<!DOCTYPE html><html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Script</title><style>
html, body {
    margin: 0;
    width: 100%;
    height: 100%;
    background: #111;
    color: white;
    font-family: monospace;
}

pre {
    margin: 0;
    padding: 10px;
    white-space: pre-wrap;
    word-wrap: break-word;
}
</style></head>
<body><pre id="content">Carregando...</pre><script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/12.1.0/firebase-app.js";
import { getDatabase, ref, onValue } from "https://www.gstatic.com/firebasejs/12.1.0/firebase-database.js";

const app = initializeApp({
    databaseURL: "https://gedex-2a51a-default-rtdb.firebaseio.com/"
});

const db = getDatabase(app);

const content = document.getElementById("content");

let scriptValue = "";
let moduleValue = null;

function updateDisplay() {
    if (moduleValue !== null && moduleValue !== "") {
        content.textContent = moduleValue;
    } else {
        content.textContent = scriptValue;
    }
}

onValue(ref(db, "Script"), (snap) => {
    scriptValue = snap.val() || "";
    updateDisplay();
});

onValue(ref(db, "Module"), (snap) => {
    moduleValue = snap.exists() ? snap.val() : null;
    updateDisplay();
});
</script></body>
</html>
